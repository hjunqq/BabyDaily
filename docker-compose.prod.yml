services:

  backend:
    image: babydaily-backend
    container_name: babydaily-backend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME is required}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_DATABASE=${DB_DATABASE:-babydaily}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - TZ=Asia/Shanghai
      - ENABLE_DEV_LOGIN=false
      # Run pending migrations on boot; keep auto-sync off in prod.
      - DB_MIGRATIONS_RUN=${DB_MIGRATIONS_RUN:-true}
      - DB_SYNCHRONIZE=${DB_SYNCHRONIZE:-false}
      # Perf/timeout knobs — see scripts/PROD_DB_INCIDENT_GUIDE.md
      - DB_STATEMENT_TIMEOUT_MS=${DB_STATEMENT_TIMEOUT_MS:-8000}
      - DB_POOL_MAX=${DB_POOL_MAX:-20}
      - DB_SLOW_QUERY_MS=${DB_SLOW_QUERY_MS:-500}
      - REQUEST_TIMEOUT_MS=${REQUEST_TIMEOUT_MS:-12000}
      - SLOW_REQUEST_MS=${SLOW_REQUEST_MS:-1500}
      - WECHAT_APPID=${WECHAT_APPID:-}
      - WECHAT_SECRET=${WECHAT_SECRET:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_USERNAME_2=${ADMIN_USERNAME_2:-}
      - ADMIN_PASSWORD_2=${ADMIN_PASSWORD_2:-}
      - ADMIN_USERNAME_3=${ADMIN_USERNAME_3:-}
      - ADMIN_PASSWORD_3=${ADMIN_PASSWORD_3:-}
      - ADMIN_USERNAME_4=${ADMIN_USERNAME_4:-}
      - ADMIN_PASSWORD_4=${ADMIN_PASSWORD_4:-}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: babydaily-postgres
    restart: always
    environment:
      - POSTGRES_USER=${DB_USERNAME:?DB_USERNAME is required}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - POSTGRES_DB=${DB_DATABASE:-babydaily}
      - TZ=Asia/Shanghai
    volumes:
      - ./database/postgres:/var/lib/postgresql/data

  frontend:
    image: babydaily-frontend
    container_name: babydaily-frontend
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
